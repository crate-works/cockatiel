<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cockatiel</title>
    <script>
      // SPA deep-link restore. GitHub Pages can't serve client-side routes under
      // /app/ as files, so the root 404.html (the marketing site) encodes the
      // requested path into `?/...` and redirects here. Decode it back into the
      // real URL with replaceState before the router boots. A no-op for normal
      // loads (/app/) and the OAuth callback (?code=... — never starts with `/`).
      ((l) => {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map((s) => s.replace(/~and~/g, '&'))
            .join('?');
          window.history.replaceState(null, '', `${l.pathname.slice(0, -1)}${decoded}${l.hash}`);
        }
      })(window.location);
    </script>
    <script>
      // Cross-origin isolation is required for SharedArrayBuffer / the VAD worker.
      // The dev server (vite.config.ts) and the self-host nginx image send real
      // COOP/COEP headers, so the page is already isolated and the shim is skipped.
      // GitHub Pages cannot send those headers, so there we register the
      // coi-serviceworker fallback (it reloads the page once the worker is active).
      // credentialless mode lets us still fetch public catalogue URLs that don't
      // send Cross-Origin-Resource-Policy.
      window.coi = { coepCredentialless: () => true };
      if (!window.crossOriginIsolated) {
        const coiScript = document.createElement('script');
        coiScript.src = new URL('coi-serviceworker.js', document.baseURI).href;
        document.head.appendChild(coiScript);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
