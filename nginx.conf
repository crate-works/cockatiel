server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation for SharedArrayBuffer (the Silero VAD pthread
    # workers). With these real headers the page is already cross-origin
    # isolated, so the coi-serviceworker shim in index.html self-skips.
    # `credentialless` (rather than require-corp) still lets the browser fetch
    # public catalogue audio URLs that don't send Cross-Origin-Resource-Policy.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # SPA fallback. Real files (assets, wasm, config.json) are served directly;
    # the app shell handles deep paths such as /auth/callback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
